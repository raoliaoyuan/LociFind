name: Release Windows

# 触发：推送 v* 标签自动构建；或在 Actions 页手动触发（workflow_dispatch）。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release 标签（如 v0.1.0），手动触发时必填"
        required: true

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write # tauri-action 创建 Release 需要写权限
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"

      - name: Install frontend deps
        working-directory: apps/desktop
        run: npm install # 仓库未追踪 package-lock.json，故用 install 而非 ci

      # BETA-32 follow-up ④：守 Cargo.lock 与 Cargo.toml 一致、防 CI 静默重生 lock
      # 漂移本地 dep set。`cargo metadata --locked` 在 lock 缺 / 不一致 / Cargo.toml
      # 改了 dep 但 lock 没同步时 fail-fast；与下方 tauri build `args` 的
      # `-- --locked` 透传形成两道守门（透传依赖 tauri build CLI 行为、verify step
      # 直接走 cargo、更稳）。本 step 失败即 fail job、不进 tauri build。
      - name: Verify Cargo.lock pin (--locked)
        working-directory: apps/desktop/src-tauri
        shell: bash
        run: cargo metadata --locked --format-version 1 > /dev/null

      # 构建说明（model-fallback + semantic-recall feature）：
      #   - `args: --features model-fallback,semantic-recall` 让 tauri build 透传给 cargo，
      #     同时启用 (a) 模型 fallback 真推理（BETA-23/24）+ (b) BETA-15B-1 语义召回 embedding；
      #     两者共用 llama-cpp 后端（windows-latest 已自带 cmake）。Windows 走 CPU 推理（无 metal）。
      #   - `-- --locked` 把 `--locked` 透给底层 cargo build（tauri build `--` 之后透 cargo flags）。
      #     与 release-daemon.yml `cargo build --locked` 同款语义：保 release binary 与 Cargo.lock
      #     一致、防 CI 静默重生 lock 导致与本地 dep set 漂移（BETA-32 follow-up ④、T12 reviewer 提）。
      #   - 两个模型文件均不打包进安装包；用户需手动放置到 %APPDATA%\LociFind\models\：
      #       · 生成 fallback 模型 qwen3-0.6b-q4_k_m.gguf（可选，启用 AI 解析）
      #       · 语义召回 embedding 模型 qwen3-embedding-0.6b-q4_k_m.gguf（可选，启用「按意思找到」）
      #     （对应 dirs::data_dir()/LociFind/models/，即 AppData\Roaming）；
      #     不放置则各自静默降级（fallback→parser-only / 语义召回→FTS-only）。
      #   - Release 说明中须包含此放置指引（CONVENTIONS §8 changelog 要求）。
      #   - BETA-25：llama-cpp-4 已关默认 dynamic-link 走静态链接，安装包不再依赖
      #     外部 llama DLL（修复此前 NSIS 缺 DLL 的隐患）。
      #   - BETA-15B-4 注：Windows semantic-recall（embedding）首次真机随本次发版验证（NSIS/DLL/embedding 加载）。
      - name: Build Tauri app + create Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop # 含 src-tauri 与前端 package.json
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "LociFind ${{ github.event.inputs.tag || github.ref_name }}"
          # 占位模板：真实 changelog 按 CONVENTIONS §8 在发版后用
          # `gh release edit <tag> --notes-file <file>` 补全（勿依赖此静态文案）。
          releaseBody: |
            LociFind Windows 测试版（NSIS 安装包）。

            - 由 GitHub Actions 在 windows-latest 上自动构建。
            - 未做代码签名（开源免费分发），首次运行 Windows SmartScreen 可能提示，选择「更多信息 → 仍要运行」即可。
            - 放行步骤 / SHA256 校验 / 升级卸载说明：见 [安装指南](https://github.com/raoliaoyuan/LociFind/blob/main/docs/install.md)。

            **模型文件（均可选，首选应用内「快速入门」一键下载；也可手动放置到 `%APPDATA%\LociFind\models\`）：**
            - `embeddinggemma-300m-q8_0.gguf` —— 语义召回 embedding 模型（启用「按意思找到」/ 跨语言）。缺失则语义召回降级纯关键词（FTS）。
            - `qwen3-0.6b-q4_k_m.gguf` —— 生成模型 fallback（复杂查询 AI 解析）。缺失则降级 parser-only。

            两者均不放置也可正常使用（纯关键词搜索）。「选项 → 常规 / 语义召回」可查看各模型状态。

            （详细 changelog 发版后补全）
          releaseDraft: false
          prerelease: true
          args: --features model-fallback,semantic-recall -- --locked
