# locifindd 企业三场景测试配置示例。
# 路径使用相对占位；实际运行时替换为本目录的绝对路径。

[server]
bind = "127.0.0.1:8765"

[audit]
log_query = true

[[collections]]
id = "case-2026-blueharbor"
display_name = "蓝湾贸易合同纠纷案（一审）"
subject_kind = "case"
roots = ["test-materials/enterprise-scenarios-raw/lawfirm/case-2026-blueharbor"]
read_only = true
audit_tags = ["litigation", "contract-dispute"]
# BETA-43：缺省 false（read_document 仅片段模式）；显式 true 才放开全文读取。
allow_full_read = false

[[collections]]
id = "case-2026-northfield"
display_name = "北原并购尽调项目"
subject_kind = "case"
