[package]
name = "locifind-model-runtime"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true

[lints]
workspace = true

[dependencies]
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }

# Llama.cpp backend (requires cmake)
# BETA-25：default-features=false 去掉 llama-cpp-4 默认的 `dynamic-link`（病根：产出
# @rpath/*.dylib 而二进制无 LC_RPATH → 安装包启动即崩）。同去 `mtmd`(未用多模态)/`openmp`
# (避免牵出 libgomp/libomp 动态依赖)。metal 仍由 model-runtime 自身 `metal` feature 接线供给。
llama-cpp-4 = { version = "0.3.0", optional = true, default-features = false }

# Candle backend (pure Rust, GGUF support)
candle-core = { version = "0.10.2", optional = true }
candle-transformers = { version = "0.10.2", optional = true }
candle-nn = { version = "0.10.2", optional = true }

[features]
default = ["stub"]
stub = []
llama-cpp = ["llama-cpp-4", "llama-cpp-4/mtmd"]
candle = ["candle-core", "candle-transformers", "candle-nn"]
metal = ["llama-cpp-4?/metal", "candle-core?/metal", "candle-transformers?/metal"]
cuda = ["llama-cpp-4?/cuda", "candle-core?/cuda", "candle-transformers?/cuda"]
vulkan = ["llama-cpp-4?/vulkan"]
