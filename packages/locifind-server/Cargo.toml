[package]
name = "locifind-server"
description = "LociFind 服务端核心：把 hybrid 检索包装成 MCP server，供 daemon binary 与桌面 app 嵌入复用。BETA-32 C2a 起骨架。"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
# 项目内 crate（依赖于现有 hybrid 检索能力）
locifind-indexer = { path = "../indexer" }
locifind-model-runtime = { path = "../model-runtime" }
locifind-intent-parser = { path = "../intent-parser" }
locifind-harness = { path = "../harness" }
locifind-result-normalizer = { path = "../result-normalizer" }
locifind-ranker = { path = "../ranker" }
locifind-search-backend = { path = "../search-backends/common" }
locifind-local-index-backend = { path = "../search-backends/local-index" }
locifind-semantic-index = { path = "../search-backends/semantic-index" }

# Async runtime（项目惯例走 workspace；server 多线程 + 信号 + fs 等 features 直接加）
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "time", "fs", "signal"] }

# HTTP / 中间件栈
axum = { version = "0.8", features = ["macros", "json"] }
tower = "0.5"
tower-http = { version = "0.7", features = ["trace", "limit"] }

# MCP SDK（rmcp 1.8 是当前稳定版；features 名沿用 server + transport-streamable-http-server）
rmcp = { version = "1.8", features = ["server", "transport-streamable-http-server"] }

# 序列化 / 错误 / 日志
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# BETA-36：daemon TOML 配置（[[collections]] + [[tokens]] + [audit]）
toml = "0.8"
thiserror = "2"
anyhow = "1"
tracing = "0.1"

# 凭据 / 常量时间比较（Bearer token 鉴权）
secrecy = { version = "0.10", features = ["serde"] }
subtle = "2.6"

# 并发原语 / async-trait / 时间
parking_lot = "0.12"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tempfile = "3"
httptest = "0.16"
tokio = { workspace = true, features = ["test-util", "macros", "rt-multi-thread"] }
# dev-only：测试需要 ServiceExt::oneshot 调 Router；tower 0.5 默认无 features，
# 显式加 util。生产路径用 axum 自带的 layer 组合，不依赖 tower::util。
tower = { version = "0.5", features = ["util"] }
